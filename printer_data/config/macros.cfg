[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True
variable_custom_park_x    : 28.0
variable_custom_park_y    : 10.0
variable_custom_park_dz   : 10.0

variable_retract          : 1.0
variable_cancel_retract   : 5.0
variable_speed_retract    : 35.0
variable_unretract        : 1.0
variable_speed_unretract  : 35.0
variable_speed_hop        : 15.0
variable_speed_move       : 100.0

variable_park_at_cancel   : True
variable_park_at_cancel_x : 28.0
variable_park_at_cancel_y : 210

variable_use_fw_retract   : False
variable_idle_timeout     : 0
variable_runout_sensor    : ""

variable_user_pause_macro : ""
variable_user_resume_macro: ""
variable_user_cancel_macro: ""
gcode:

######################################################################
# SOAK_ZTILT_MESH
######################################################################1

[gcode_macro HEATSOAK_ZTILT_MESH]
description: Heat soak bed, run Z tilt, then calibrate bed mesh
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set SOAK = params.SOAK|default(20)|int %}
    {% set PROFILE = params.PROFILE|default("default") %}

    RESPOND TYPE=echo MSG="Heating bed to {BED}C."
    M140 S{BED}
    M190 S{BED}

    RESPOND TYPE=echo MSG="Homing printer."
    G28

    ; Move to a safe center-ish position during soak
    G90
    G1 Z10 F1200
    G1 X110 Y110 F6000

    RESPOND TYPE=echo MSG="Heat soaking for {SOAK} minutes."
    G4 P{SOAK * 60000}

    RESPOND TYPE=echo MSG="Running Z_TILT_ADJUST."
    Z_TILT_ADJUST

    RESPOND TYPE=echo MSG="Re-homing Z after Z tilt."
    G28 Z

    RESPOND TYPE=echo MSG="Clearing old mesh and running BED_MESH_CALIBRATE."
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE PROFILE={PROFILE}

    ; Present bed forward when done
    G90
    G1 Z10 F1200
    G1 X28 Y210 F6000

    RESPOND TYPE=echo MSG="Heat soak, Z tilt, and bed mesh complete. Run SAVE_CONFIG if you want to save the new mesh."

######################################################################
# Start Print and End Print
######################################################################

[gcode_macro START_PRINT]
description: Start print macro called from Orca Slicer
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(200)|float %}

    RESPOND TYPE=echo MSG="START_PRINT IS RUNNING - BED={BED} HOTEND={HOTEND}"

    ; Start bed and hotend heating, but do not wait yet
    M140 S{BED}
    M104 S{HOTEND}

    ; Basic setup
    G90                     ; Absolute positioning
    M83                     ; Relative extrusion 
    G92 E0                  ; Reset extruder

    ; Home printer
    G28

    ; Wait for temperatures
    M190 S{BED}
    M109 S{HOTEND}

    ; Level/align gantry
    Z_TILT_ADJUST

    ; Re-home Z after Z_TILT_ADJUST
    G28 Z

    ; Load compensation profiles
    BED_MESH_PROFILE LOAD=default
    SKEW_PROFILE LOAD=Calilantern
            
    ; Purge line in X direction
    G92 E0
    G1 Z2.0 F3000
    G1 X15 Y15 Z0.3 F5000.0
    G1 X215 Y15 Z0.3 F1500.0 E15
    G1 X215 Y15.4 Z0.3 F5000.0
    G1 X15 Y15.4 Z0.3 F1500.0 E15
    G92 E0

    ; Move over to prevent blob squish
    G1 Z2.0 F3000
    G1 X28 Y20 Z0.3 F5000.0

    ; Final positioning before print starts
    G92 E0
    G1 Z2.0 F3000
    G1 X28 Y20 Z0.3 F5000.0

[gcode_macro END_PRINT]
description: End print macro called from Orca Slicer
gcode:
    SAVE_GCODE_STATE NAME=END_PRINT_STATE

    ; Retract and lift safely
    G91
    M83
    G1 E-2 F1800

    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_now = printer.toolhead.position.z|float %}
    {% set z_lift = 10 if z_now < (z_max - 10) else (z_max - z_now) %}
    G1 Z{z_lift} F1200

    ; Park and present print
    G90
    G1 X28 Y210 F6000

    ; Shut down heaters and fan
    M104 S0
    M140 S0
    M106 S0

    ; Clear print compensation
    BED_MESH_CLEAR
    SET_SKEW CLEAR=1

    ; Motors off
    M84

    RESTORE_GCODE_STATE NAME=END_PRINT_STATE

######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]

[gcode_macro M600]
description: Filament change pause
gcode:
    PAUSE X=28 Y=210 Z_MIN=50


