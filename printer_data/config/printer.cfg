[include fluidd.cfg]

[include macros.cfg]

[exclude_object]

#[include adxlmcu.cfg]

#====================================================================
# M C U + M C U A U X
#====================================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044506120E2591C-if00 #UART
restart_method: command

[mcu aux]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044506130DE821C-if00
restart_method: command

#====================================================================
# PRINTER
#====================================================================

[printer]
kinematics: cartesian
max_velocity: 550
max_accel: 10000 #changed from 12500 on 2026 APRL 17
max_z_velocity: 15
max_z_accel: 30
square_corner_velocity: 5.0


#====================================================================
# VIRTUAL SD CARD
#====================================================================

[virtual_sdcard]
path: /home/e3v2/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


#====================================================================
# STEPPER X
#====================================================================

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 40.0 #this is based on CaliFlower calibration 22 Jul 2025
# endstop_pin: ^gpio4 #not needed for sensorless homing SML
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0
position_endstop: -8
position_min: -8
position_max: 227
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 0.9 #this was 0.7 for old motor
hold_current: 0.6
#stealthchop_threshold: 999999
stealthchop_threshold: 0 #for speedBenchy
diag_pin: ^gpio4  #sensorless homing sml
driver_SGTHRS: 100 #sensorless homing sml

#====================================================================
# STEPPER Y
#====================================================================

[stepper_y]
step_pin: gpio6
dir_pin: gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 40.0 # This based on CaliFlower calibration 22 Jul 2025
# endstop_pin: ^gpio3 #Not needed for sensorless homing SML
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: 1
position_min: 1
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
#run_current: 0.7
hold_current: 0.5
run_current: 1.2 #speed benchy
#stealthchop_threshold: 999999
stealthchop_threshold: 0 #for speedBenchy
diag_pin: ^gpio3
driver_SGTHRS: 60

#====================================================================
# STEPPER Z
#====================================================================

[stepper_z1]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: ^gpio25
#position_endstop: 0
endstop_pin: probe:z_virtual_endstop

[tmc2209 stepper_z1]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 0.8 #sml - was 0.580, after belted z mod changed to match y
hold_current: 0.6 #sml - was 0.500, after belted z mod changed to match y
#stealthchop_threshold: 999999
stealthchop_threshold: 0

[stepper_z]
step_pin: gpio14
dir_pin: !gpio13
enable_pin: !gpio15
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
#position_endstop: 0
endstop_pin: probe:z_virtual_endstop
position_min: -6.0
position_max: 230
homing_speed: 12

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 3
run_current: 0.8 #sml - was 0.580, after belted z mod changed to match y
hold_current: 0.6 #sml - was 0.500, after belted z mod changed to match y
#stealthchop_threshold: 999999
stealthchop_threshold: 0

#====================================================================
# EXTRUDER
#====================================================================

[extruder]
step_pin: aux:gpio14
dir_pin: !aux:gpio13
enable_pin: !aux:gpio15
max_extrude_only_distance: 500.0 #SML added 2026 April 17 - copied from E3P
max_extrude_only_velocity: 120 #SML added 2026 April 17 - copied from E3P
#max_extrude_only_accel: 3000 #SML added 2026 April 13
microsteps: 16
rotation_distance: 27.335984 #SL for 0.6 Volcano with Voxel PLA
gear_ratio: 50:8 #for sherpa mini 8t motor
full_steps_per_rotation: 200 #1.8deg Motor
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: gpio23
sensor_type: PT1000
sensor_pin: gpio27
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0 #should probably change this to 175 or so.....
max_temp: 300
max_extrude_cross_section:2
pressure_advance: 0.0208

[tmc2209 extruder]
uart_pin: aux:gpio9
tx_pin: aux:gpio8
uart_address: 3
run_current: 0.650
hold_current: 0.500
#stealthchop_threshold: 999999
stealthchop_threshold: 0

#====================================================================
# BED
#====================================================================

[heater_bed]
heater_pin: gpio21
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio26
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

#====================================================================
# FANS
#====================================================================

[fan]
pin: aux:gpio17


[heater_fan hotend_fan]
pin: gpio18
heater: extruder
heater_temp: 55.0

[heater_fan box_fan]
pin: gpio20
heater: heater_bed
heater_temp: 45.0

#[output_pin test_fan]
#pin: aux:gpio17   # or use !PA9 if it's inverted
#pwm: True
#hardware_pwm: True
#shutdown_value: 0

#fan on aux board below

#[heater_fan hotend_fan2]
#pin: aux:gpio18
#heater: extruder
#heater_temp: 35.0

#[heater_fan box_fan2]
#pin: aux:gpio20
#heater: heater_bed
#heater_temp: 45.0

#====================================================================
# Z TILT
#====================================================================

[z_tilt]
z_positions:
    -30,110
    265,110 
    
points: 
    55.5,142
    226.5,142
retries: 5
retry_tolerance: 0.02 
horizontal_move_z: 10
speed:120

#====================================================================
# Raspberry Pi Temperature Display for Fluidd
#====================================================================

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor pico]
sensor_type: temperature_mcu

#====================================================================
# BL TOUCH
#====================================================================

[bltouch]
sensor_pin: ^gpio22
control_pin: gpio29
x_offset: -56.3       #sml - from Squirrel Elf
y_offset: -5 #sml - from Squirrel Elf
samples: 2
speed: 2
#z_offset: 0.0
pin_up_touch_mode_reports_triggered: False
pin_up_reports_not_triggered: True
probe_with_touch_mode: True

[bed_mesh]
speed: 225
horizontal_move_z: 5
mesh_min: 4, 18     #!!min and max co-ords are based on the probes location not the nozzle!!
mesh_max: 168, 216 #needs to be calibrated for your individual printer - was 170, 215
probe_count: 5,5 #this is the number of probing points on X then Y axis
mesh_pps: 3,3
fade_start: 1
fade_end: 10
fade_target: 0

[safe_z_home]
home_xy_position: 142.5,142.5 #sml - this should be the center of your bed
speed: 50
z_hop:15
z_hop_speed: 5

[screws_tilt_adjust]
screw1: 76.3, 210  ##modified on 24 APR 2026
screw2: 225, 210 #modified 24 APR 2026
screw3: 225, 40 #modified 24 APR 2026
screw4: 76.3, 40 #modified 24 APR 2026
screw1_name: rear left screw
screw2_name: rear right screw
screw3_name: front right screw
screw4_name: front left screw
horizontal_move_z: 8.
speed: 125. #speed of travel moves between screws
screw_thread: CW-M4 #measure your bed screw m3=3mm / m4=4mm / m5=5mm

[neopixel nozzle_light]
pin: aux:gpio24
chain_count: 1
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

[skew_correction]


