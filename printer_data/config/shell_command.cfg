[gcode_shell_command hello_world]
command: echo hello world
timeout: 2.
verbose: True

[gcode_macro HELLO_WORLD]
gcode:
    RUN_SHELL_COMMAND CMD=hello_world


[gcode_shell_command play_print_done_sound]
command: aplay -D hdmi:CARD=vc4hdmi0,DEV=0 /home/e3v2/printer_data/sounds/print_done.wav
timeout: 3.
verbose: True

[gcode_macro PLAY_PRINT_DONE_SOUND]
gcode:
    RUN_SHELL_COMMAND CMD=play_print_done_sound